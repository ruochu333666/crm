services:
  mysql:
    image: mysql:8.0
    container_name: crm-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-app_db}
      MYSQL_USER: ${MYSQL_USER:-crm_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-crm123}
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./backend/seed_demo_data.sql:/docker-entrypoint-initdb.d/seed_demo_data.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root123}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: crm-backend
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      HOST: ${HOST:-0.0.0.0}
      PORT: ${PORT:-5174}
      DB_HOST: ${DB_HOST:-mysql}
      DB_PORT: ${DB_PORT:-3306}
      DB_USER: ${DB_USER:-crm_user}
      DB_PASSWORD: ${DB_PASSWORD:-crm123}
      DB_NAME: ${DB_NAME:-app_db}
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
      AI_ENABLED: ${AI_ENABLED:-true}
      AI_BASE_URL: ${AI_BASE_URL:-https://ark.cn-beijing.volces.com/api/v3}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-}
      AI_TIMEOUT_MS: ${AI_TIMEOUT_MS:-20000}
      AI_PROTOCOL: ${AI_PROTOCOL:-openai}
    ports:
      - "5174:5174"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:5174/api/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: .
    container_name: crm-frontend
    depends_on:
      backend:
        condition: service_healthy
    environment:
      VITE_API_BASE: ${VITE_API_BASE:-http://localhost:5174/api}
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - frontend_node_modules:/app/node_modules
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "5173"]

volumes:
  mysql_data:
  backend_node_modules:
  frontend_node_modules:

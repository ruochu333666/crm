services:
  mysql:
    image: mysql:8.0
    container_name: crm-mysql-prod
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_prod_data:/var/lib/mysql
      - ../../backend/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../../backend
      dockerfile: ../docker/prod/Dockerfile.backend
    container_name: crm-backend-prod
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      HOST: 0.0.0.0
      PORT: 5174
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      AI_ENABLED: ${AI_ENABLED:-true}
      AI_BASE_URL: ${AI_BASE_URL:-https://ark.cn-beijing.volces.com/api/v3}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-}
      AI_TIMEOUT_MS: ${AI_TIMEOUT_MS:-20000}
      AI_PROTOCOL: ${AI_PROTOCOL:-openai}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:5174/api/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ../../
      dockerfile: docker/prod/Dockerfile.frontend
      args:
        VITE_API_BASE: ${VITE_API_BASE:-/api}
    container_name: crm-frontend-prod
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${APP_PORT:-80}:80"

volumes:
  mysql_prod_data:
